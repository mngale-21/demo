<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amateur System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            width: 100%;
        }

        .left-side {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .student-img {
            max-width: 80%;
            height: auto;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .right-side {
            padding: 40px;
            background: rgba(10, 15, 30, 0.5);
        }

        .form-control {
            background: #020617;
            border: 1px solid #334155;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
        }

        .form-control:focus {
            background: #020617;
            color: white;
            border-color: #38bdf8;
            box-shadow: none;
        }

        .btn-login {
            background: #38bdf8;
            color: #0f172a;
            font-weight: 800;
            border-radius: 10px;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.2);
            padding: 5px;
        }

        .error-msg {
            color: #fb7185;
            font-size: 0.85rem;
            background: rgba(251, 113, 133, 0.1);
            border-left: 4px solid #fb7185;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="row g-0">
        <!-- Upande wa Picha (Unajificha kwenye simu ndogo sana kama ukipenda, au unakaa juu) -->
        <div class="col-lg-6 d-none d-lg-flex left-side">
            <h1 class="fw-bold">Amateur System</h1>
            <p class="opacity-75">Empowering the next generation of scholars through seamless record management.</p>
            <img src="/images/Mwanafunzi.jpg" alt="Student" class="student-img mt-4">
        </div>

        <!-- Upande wa Login -->
        <div class="col-lg-6 right-side">
            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/(lang='en')}" class="text-decoration-none small text-secondary fw-bold">EN</a>
                <span class="mx-2 text-secondary">|</span>
                <a th:href="@{/(lang='sw')}" class="text-decoration-none small text-secondary fw-bold">SW</a>
            </div>

            <div class="text-center">
                <div class="logo-container">
                    <img src="/images/logo.png" alt="Logo" class="img-fluid rounded-circle">
                </div>
                <h2 class="fw-bold mb-4">Sign In</h2>
            </div>

            <div th:if="${param.error}" class="error-msg mb-3 text-center">
                Invalid Username or Password.
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="mb-3">
                    <label class="form-label small text-secondary">Registration Number</label>
                    <input type="text" name="username" class="form-control" placeholder="T/UDOM/..." required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small text-secondary">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()" id="eyeBtn">SHOW</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100 mt-3">LOG INTO SYSTEM</button>
            </form>

            <div class="text-center mt-4">
                <a href="/forgot_password" class="text-secondary small text-decoration-none">Forgot password?</a>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('password');
        const eyeBtn = document.getElementById('eyeBtn');
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            eyeBtn.textContent = 'HIDE';
        } else {
            passwordField.type = 'password';
            eyeBtn.textContent = 'SHOW';
        }
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
