<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amateur System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background-color: #020617; 
            padding: 15px; /* Nafasi kidogo kwa simu */
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px; 
            min-height: 600px; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(12px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        /* UPANDE WA KUSHOTO (Desktop pekee picha inaonekana kubwa) */
        .left-side {
            flex: 1.2; 
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .left-side h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 800; }
        .left-side p { font-size: 1rem; opacity: 0.9; max-width: 90%; }

        .student-img {
            width: 100%;
            max-width: 350px; 
            margin-top: 30px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* UPANDE WA KULIA (Login Form) */
        .right-side {
            flex: 1; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(10, 15, 30, 0.5);
            position: relative;
        }

        .logo-container {
            width: 100px; height: 100px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.3);
            overflow: hidden;
        }

        .login-logo { width: 100%; height: 100%; object-fit: cover; }

        .lang-selector { position: absolute; top: 15px; right: 15px; font-size: 0.8rem; }
        .lang-btn { color: #94a3b8; text-decoration: none; font-weight: bold; }

        h2 { color: #f8fafc; margin-bottom: 25px; text-align: center; font-size: 1.5rem; }

        .input-group { margin-bottom: 15px; }

        input { 
            width: 100%; padding: 14px 18px; 
            border: 1px solid #334155; border-radius: 12px; 
            background: #020617; color: white; outline: none;
        }

        input:focus { border-color: #38bdf8; }

        .password-wrapper { position: relative; }
        .toggle-eye {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #64748b; font-size: 0.7rem; font-weight: bold;
        }

        button { 
            width: 100%; padding: 14px; 
            background: #38bdf8; color: #0f172a; 
            border: none; border-radius: 12px; 
            cursor: pointer; font-weight: 800; text-transform: uppercase;
        }

        .forgot-pass {
            margin-top: 20px; display: block; color: #64748b;
            text-decoration: none; font-size: 0.85rem; text-align: center;
        }

        .error-msg { 
            color: #fb7185; font-size: 0.85rem; background: rgba(251, 113, 133, 0.1); 
            padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;
        }

        /* --- RESPONSIVE DESIGN (SIMU) --- */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-wrapper { flex-direction: column; border-radius: 20px; height: auto; }
            
            /* Picha na maandishi juu kwa simu */
            .left-side { padding: 30px 20px; }
            .left-side h1 { font-size: 1.8rem; }
            .student-img { max-width: 180px; margin-top: 15px; }

            .right-side { padding: 30px 20px; background: #0f172a; }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="left-side">
            <h1>Amateur System</h1>
            <p>Empowering scholars through seamless record management.</p>
            <img src="/images/Mwanafunzi.jpg" alt="Academic Excellence" class="student-img">
        </div>

        <div class="right-side">
            <div class="lang-selector">
                <a th:href="@{/(lang='en')}" class="lang-btn">EN</a> | 
                <a th:href="@{/(lang='sw')}" class="lang-btn">SW</a>
            </div>  

            <div class="logo-container">
                <img src="/images/logo.png" alt="Logo" class="login-logo">
            </div>

            <h2>Sign In</h2>
            
            <div th:if="${param.error}" class="error-msg">
                Invalid Username or Password.
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Registration Number" required>
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="toggle-eye" onclick="togglePassword()" id="eyeIcon">SHOW</span>
                </div>
                
                <button type="submit">LOG INTO SYSTEM</button>
            </form>

            <a href="/forgot_password" class="forgot-pass">Forgot password?</a>
        </div>
    </div>

    <footer style="margin-top: 20px; color: #475569; font-size: 0.75rem; text-align: center;">
        &copy; 2026 Amateur System | Developed by Evodi Phinnance
    </footer>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.textContent = 'HIDE';
            } else {
                passwordField.type = 'password';
                eyeIcon.textContent = 'SHOW';
            }
        }
    </script>
</body>
</html>
