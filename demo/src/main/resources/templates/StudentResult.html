<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Academic Results | Amateur Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent: #38bdf8;
            --border: #e2e8f0;
        }

        /* Dark Mode Support */
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #334155;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; color: var(--text-main); }
        .container { width: 90%; max-width: 1100px; margin: 40px auto; }
        
        /* Header Section */
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }

        /* Filter Modernized */
        .filter-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-body);
            color: var(--text-main);
            outline: none;
            font-weight: 600;
        }

        /* Summary Stats Cards */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card span { display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .stat-card h2 { font-size: 1.5rem; margin: 10px 0 0 0; color: var(--accent); }

        /* Modern Table Styling */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-body); padding: 18px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
        td { padding: 18px; border-top: 1px solid var(--border); }

        /* Grade Badges */
        .grade-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .grade-a { background: #dcfce7; color: #15803d; }
        .grade-f { background: #fee2e2; color: #b91c1c; }
        .grade-pass { background: #f0f9ff; color: #0369a1; }

        .empty-state { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>Academic Results</h1>
        <p style="color: #64748b;">Review your performance and grade breakdowns.</p>
    </div>

    <div class="filter-card">
        <form th:action="@{/student/results}" method="get" id="filterForm">
            <label style="font-size: 0.9rem; font-weight: 600; margin-right: 10px;">Exam Period:</label>
            <select name="examType" onchange="document.getElementById('filterForm').submit()">
                <option value="">-- Select Exam --</option>
                <option value="MIDTERM_MARCH" th:selected="${selectedExam == 'MIDTERM_MARCH'}">Midterm - March</option>
                <option value="TERMINAL" th:selected="${selectedExam == 'TERMINAL'}">Terminal (June)</option>
                <option value="ANNUAL" th:selected="${selectedExam == 'ANNUAL'}">Annual (December)</option>
            </select>
        </form>
        <button onclick="window.print()" style="background: none; border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; cursor: pointer; color: var(--text-main);">
            <i class="fas fa-print"></i> Print PDF
        </button>
    </div>

    <div class="results-summary" th:if="${not #lists.isEmpty(results)}">
        <div class="stat-card">
            <span>Average Score</span>
            <h2 th:text="${average > 0 ? #numbers.formatDecimal(average, 1, 2) : '0.00'}">0.00</h2>
        </div>
        <div class="stat-card">
            <span>Total Marks</span>
            <h2 th:text="${totalMarks}">0</h2>
        </div>
        <div class="stat-card">
            <span>GPA / Division</span>
            <h2 th:text="${division}">-</h2>
        </div>
        <div class="stat-card">
            <span>Points</span>
            <h2 th:text="${totalPoints}">0</h2>
        </div>
    </div>

    <div class="table-container" th:if="${not #lists.isEmpty(results)}">
        <table>
            <thead>
                <tr>
                    <th>Course Code & Name</th>
                    <th>Score</th>
                    <th>Grade</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${results}">
                    <td>
                        <div style="font-weight: 600;" th:text="${r.courseName}">Course</div>
                        <div style="font-size: 0.75rem; color: #64748b;">Core Subject</div>
                    </td>
                    <td th:text="${r.marks + '%'}" style="font-weight: 700;">0%</td>
                    <td>
                        <span th:text="${r.grade}" 
                              th:classappend="${r.grade == 'F'} ? 'grade-badge grade-f' : 'grade-badge grade-pass'">
                        </span>
                    </td>
                    <td>
                        <span th:if="${r.grade != 'F'}" style="color: #10b981; font-size: 0.85rem;"><i class="fas fa-check-circle"></i> Passed</span>
                        <span th:if="${r.grade == 'F'}" style="color: #ef4444; font-size: 0.85rem;"><i class="fas fa-times-circle"></i> Failed</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(results)}" class="table-container">
        <div class="empty-state">
            <i class="fas fa-chart-line" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.2;"></i>
            <h3>No Results Found</h3>
            <p>Please select an examination period to view your scores.</p>
        </div>
    </div>
</div>

<script>
    // Inasoma theme mara moja kabla page haijawa "rendered"
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
</script>

</body>
</html>
