<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{student.dashboard.title}">Student Dashboard | Amateur Pro</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #1e293b;
            --accent-color: #38bdf8;
            --text-light: #f1f5f9;
            --danger: #ef4444;
            --bg-body: #f8fafc;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
        }
        
        body { 
            background-color: var(--bg-body); 
            overflow-x: hidden;
            display: flex;
        }

        /* --- Navbar --- */
        .navbar {
            height: 65px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            color: var(--primary-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1100;
            border-bottom: 1px solid #e2e8f0;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 22px; cursor: pointer; transition: 0.3s; padding: 5px; color: var(--primary-color); }
        .menu-btn:hover { color: var(--accent-color); }

        .nav-right { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; }
        
        .lang-link {
            text-decoration: none;
            color: var(--secondary-color);
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .lang-link:hover, .lang-link.active { color: var(--accent-color); background: #f0f9ff; }

        .reg-box { 
            background: #f1f5f9; 
            padding: 6px 15px; 
            border-radius: 20px; 
            border: 1px solid #e2e8f0; 
            font-weight: 600; 
            color: var(--primary-color); 
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--primary-color);
            position: fixed;
            top: 0;
            left: -260px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1050;
            padding-top: 80px;
        }

        .sidebar.active { left: 0; }

        .sidebar a {
            padding: 12px 25px;
            margin: 5px 15px;
            display: flex;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            transition: 0.3s;
            border-radius: 10px;
        }

        .sidebar a i { width: 30px; font-size: 18px; }
        .sidebar a:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent-color); }
        .sidebar a.active-link { background: var(--accent-color); color: var(--primary-color); font-weight: 600; }

        .logout-btn { 
            color: var(--danger) !important; 
            margin-top: 30px !important; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px !important; 
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 100px 40px 40px 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            margin-left: 0;
        }

        .main-content.pushed { margin-left: 260px; }

        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 50px;
            border-radius: 20px;
            color: white;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .welcome-section h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        .welcome-section p { color: #94a3b8; font-size: 1.1rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 15px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: var(--accent-color); }
        .card i { font-size: 45px; color: var(--accent-color); background: #f0f9ff; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .card h3 { font-size: 1.1rem; color: var(--primary-color); font-weight: 700; }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1040;
        }
        .overlay.active { display: block; }

        @media (max-width: 768px) {
            .main-content.pushed { margin-left: 0; }
            .welcome-section { padding: 30px; }
            .welcome-section h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Overlay for mobile sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
            <span style="font-weight: 900; letter-spacing: 1px;">AMATEUR PRO</span>
        </div>
        
        <div class="nav-right">
            <!-- Language Switcher -->
            <div style="margin-right: 15px;">
                <a th:href="@{?lang=en}" 
                   class="lang-link" 
                   th:classappend="${#locale.language == 'en'} ? 'active' : ''">EN</a> | 
                <a th:href="@{?lang=sw}" 
                   class="lang-link" 
                   th:classappend="${#locale.language == 'sw'} ? 'active' : ''">SW</a>
            </div>
            
            <!-- Registration ID -->
            <div class="reg-box">
                <i class="fas fa-id-card-alt" style="margin-right: 5px; color: var(--accent-color);"></i> 
                <span th:text="${currentUser != null ? currentUser.username : 'REG-XXXX'}">REG-2024-001</span>
            </div>
            
            <i class="fas fa-user-circle" style="font-size: 28px; color: var(--secondary-color);"></i>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <aside class="sidebar" id="sidebar">
        <!-- Profile Summary -->
        <div style="text-align: center; padding: 0 0 30px 0;">
            <div style="width: 80px; height: 80px; background: var(--accent-color); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--primary-color); font-weight: 900; border: 4px solid rgba(255,255,255,0.1);">
                <span th:text="${currentUser.firstName != null && !currentUser.firstName.isEmpty() ? #strings.substring(currentUser.firstName,0,1) : 'S'}">S</span>
            </div>
            <p style="color: white; font-weight: 700; font-size: 1.1rem;" 
               th:text="${(currentUser.firstName != null ? currentUser.firstName : '') + ' ' + (currentUser.lastName != null ? currentUser.lastName : 'Student')}">User Name</p>
            <p style="color: var(--accent-color); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-top: 5px;" 
               th:text="#{student.portal.label}">Student Portal</p>
        </div>

        <!-- Links -->
        <a href="/student_dashboard" class="active-link"><i class="fas fa-th-large"></i> <span th:text="#{nav.dashboard}">Dashboard</span></a>
        <a href="/student/results"><i class="fas fa-chart-bar"></i> <span th:text="#{nav.results}">Exam Results</span></a>
        <a href="/student/attendance"><i class="fas fa-clipboard-check"></i> <span th:text="#{nav.attendance}">Attendance</span></a>
        <a th:href="@{/complete_profile}"><i class="fas fa-user-cog"></i> <span th:text="#{nav.profile}">My Profile</span></a>
        <a th:href="@{/change_password}"><i class="fas fa-lock"></i> <span th:text="#{nav.security}">Security</span></a>
     
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span th:text="#{nav.logout}">Logout</span></a>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
        <!-- Welcome Hero -->
        <section class="welcome-section">
            <h1>
                <span th:text="#{welcome.text}">WELCOME</span>, 
                <span th:text="${currentUser.firstName != null ? currentUser.firstName : 'STUDENT'}">Student</span>!
            </h1>
            <p th:text="#{welcome.subtitle.student}">Access your academic records and system features.</p>
        </section>

        <!-- Functional Cards -->
        <div class="stats-grid">
            <div class="card" onclick="location.href='/student/results'">
                <i class="fas fa-graduation-cap"></i>
                <h3 th:text="#{nav.results}">Exam Results</h3>
            </div>

            <div class="card" onclick="location.href='/student/attendance'">
                <i class="fas fa-calendar-alt"></i>
                <h3 th:text="#{nav.attendance}">Attendance</h3>
            </div>

            <div class="card" onclick="location.href='/complete_profile'">
                <i class="fas fa-user-edit"></i>
                <h3 th:text="#{nav.profile}">My Profile</h3>
            </div>

            <div class="card" onclick="location.href='/change_password'">
                <i class="fas fa-shield-alt"></i>
                <h3 th:text="#{nav.security}">Security</h3>
            </div>
        </div>
    </main>

    <!-- UI Scripts -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('active');
            mainContent.classList.toggle('pushed');
            
            if (window.innerWidth < 768) {
                overlay.classList.toggle('active');
            }
        }

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.getElementById('overlay').classList.remove('active');
            }
        });
    </script>
</body>
</html>
