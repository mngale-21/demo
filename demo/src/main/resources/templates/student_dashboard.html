<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{student.dashboard.title}">Student Dashboard | Amateur Pro</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #1e293b;
            --accent-color: #38bdf8;
            --bg-body: #f8fafc;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
        }

        /* Navbar Customization */
        .navbar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            z-index: 1050;
        }

        /* Sidebar Styling (Offcanvas) */
        .offcanvas {
            background-color: var(--primary-color);
            width: 280px !important;
        }

        .offcanvas-body a {
            padding: 12px 20px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .offcanvas-body a i { width: 30px; font-size: 18px; }
        .offcanvas-body a:hover, .offcanvas-body a.active-link {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
        }

        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 40px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Dashboard Cards */
        .card-custom {
            background: white;
            padding: 30px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            height: 100%;
        }

        .card-custom:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        .card-custom i {
            font-size: 40px;
            color: var(--accent-color);
            background: #f0f9ff;
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
            margin-bottom: 15px;
            display: inline-block;
        }

        .reg-box {
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .welcome-section { padding: 25px; }
            .welcome-section h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg sticky-top py-2">
        <div class="container-fluid">
            <button class="btn border-0 me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="fas fa-bars fs-4"></i>
            </button>
            <a class="navbar-brand fw-bold" href="#">AMATEUR PRO</a>
            
            <div class="ms-auto d-flex align-items-center">
                <div class="d-none d-sm-block me-3">
                    <a th:href="@{?lang=en}" class="text-decoration-none small fw-bold text-dark">EN</a> | 
                    <a th:href="@{?lang=sw}" class="text-decoration-none small fw-bold text-dark">SW</a>
                </div>
                <div class="reg-box d-none d-md-block">
                    <i class="fas fa-id-card-alt text-info me-1"></i>
                    <span th:text="${currentUser != null ? currentUser.username : 'REG-XXXX'}">REG-2024-001</span>
                </div>
                <i class="fas fa-user-circle fs-3 ms-3 text-secondary"></i>
            </div>
        </div>
    </nav>

    <!-- Sidebar (Bootstrap Offcanvas) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-white">Student Portal</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="text-center mb-4">
                <div class="mx-auto bg-info rounded-circle d-flex align-items-center justify-content-center text-dark fw-bold mb-2" style="width: 60px; height: 60px; font-size: 24px;">
                    <span th:text="${currentUser.firstName != null ? #strings.substring(currentUser.firstName,0,1) : 'S'}">S</span>
                </div>
                <p class="text-white fw-bold mb-0" th:text="${currentUser.firstName + ' ' + currentUser.lastName}">Evodi Phinnance</p>
            </div>

            <a href="/student_dashboard" class="active-link"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="/student/results"><i class="fas fa-chart-bar"></i> Exam Results</a>
            <a href="/student/attendance"><i class="fas fa-clipboard-check"></i> Attendance</a>
            <a href="/complete_profile"><i class="fas fa-user-cog"></i> My Profile</a>
            <a href="/change_password"><i class="fas fa-lock"></i> Security</a>
            <hr class="text-secondary">
            <a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <!-- Welcome Hero -->
        <div class="welcome-section mb-4 text-center text-md-start">
            <h1 class="fw-bold mb-2">
                <span th:text="#{welcome.text}">WELCOME</span>, 
                <span th:text="${currentUser.firstName}">EVODI</span>!
            </h1>
            <p class="mb-0 opacity-75" th:text="#{welcome.subtitle.student}">Access your academic records and system features.</p>
        </div>

        <!-- Functional Grid -->
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="card-custom" onclick="location.href='/student/results'">
                    <i class="fas fa-graduation-cap"></i>
                    <h6 class="fw-bold text-dark">Exam Results</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-custom" onclick="location.href='/student/attendance'">
                    <i class="fas fa-calendar-alt"></i>
                    <h6 class="fw-bold text-dark">Attendance</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-custom" onclick="location.href='/complete_profile'">
                    <i class="fas fa-user-edit"></i>
                    <h6 class="fw-bold text-dark">My Profile</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card-custom" onclick="location.href='/change_password'">
                    <i class="fas fa-shield-alt"></i>
                    <h6 class="fw-bold text-dark">Security</h6>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
