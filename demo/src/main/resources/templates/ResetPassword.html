<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password | Amateur Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-bg: #0f172a; --card-bg: #1e293b; --accent-color: #38bdf8; --success-color: #22c55e; --danger-color: #ef4444; --text-main: #f1f5f9; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: var(--card-bg); width: 400px; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-top: 4px solid var(--accent-color); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { font-size: 1.5rem; color: var(--accent-color); }
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--text-dim); text-transform: uppercase; }
        input { width: 100%; padding: 12px 15px; background: var(--primary-bg); border: 1px solid #334155; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent-color); }
        .btn-update { width: 100%; padding: 14px; background: var(--accent-color); color: var(--primary-bg); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-update:hover { background: #0ea5e9; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; text-align: center; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        .alert-success { background: rgba(34, 197, 94, 0.1); color: var(--success-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-key" style="font-size: 2rem; color: var(--accent-color); margin-bottom: 10px;"></i>
            <h2>Change Password</h2>
            <p>Thibitisha usalama wako hapa.</p>
        </div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/change_password}" method="POST" onsubmit="return validatePasswords()">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="oldPassword" placeholder="Enter old password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn-update">UPDATE PASSWORD</button>
        </form>
        <a th:href="@{/student_dashboard}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
    <script>
        function validatePasswords() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            if (newPass !== confirmPass) {
                alert("Password mpya hazifanani!");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
