<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{password.reset.title}">Reset Password - Amateur System</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-text: #ef4444;
            --success-bg: rgba(34, 197, 94, 0.1);
            --success-text: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            /* Background ya kisasa yenye gradient ya kiza */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
        }

        /* Language Switcher juu kulia */
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .lang-link:hover, .lang-link.active {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
        }

        .container { 
            background: var(--secondary-color); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }

        h2 { 
            color: white; 
            font-weight: 800; 
            font-size: 1.75rem;
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
        }

        p { 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            line-height: 1.5;
            margin-bottom: 30px; 
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            border: 2px solid #334155; 
            border-radius: 12px; 
            box-sizing: border-box; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus { 
            border-color: var(--accent-color); 
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--accent-color); 
            color: var(--primary-color); 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        button:hover { 
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 25px;
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }

        .message { 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-size: 0.85rem; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error { background: var(--error-bg); color: var(--error-text); border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: var(--success-bg); color: var(--success-text); border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

    <!-- Language Selection -->
    <div class="lang-container">
        <a th:href="@{?lang=en}" class="lang-link" th:classappend="${#locale.language == 'en'} ? 'active' : ''">EN</a>
        <span style="color: #334155">|</span>
        <a th:href="@{?lang=sw}" class="lang-link" th:classappend="${#locale.language == 'sw'} ? 'active' : ''">SW</a>
    </div>

    <div class="container">
        <div class="icon-box">
            <i class="fas fa-key"></i>
        </div>
        
        <h2 th:text="#{password.reset.header}">Reset Password</h2>
        <p th:text="#{password.reset.subtitle}">Enter your registered email address to receive reset instructions.</p>

        <!-- Messages -->
        <div th:if="${error}" class="message error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Error message</span>
        </div>
        <div th:if="${message}" class="message success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${message}">Success message</span>
        </div>

        <form th:action="@{/forgot_password}" method="POST">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" th:placeholder="#{placeholder.email}" required>
            </div>
            <button type="submit" th:text="#{btn.send.reset}">SEND RESET LINK</button>
        </form>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left" style="font-size: 0.8rem; margin-right: 5px;"></i>
            <span th:text="#{link.back.login}">Back to Login</span>
        </a>
    </div>

</body>
</html>
